<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonBudget — Gestion de budget familial</title>
<meta name="description" content="Suivi de budget mensuel : revenus, dépenses, catégories, historique">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b110e">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MonBudget">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Surfaces */
  --bg: #eef1ec;
  --bg2: #ffffff;
  --bg3: #f6f8f4;
  --bg4: #eef1ec;
  /* Borders */
  --border: #e6eae4;
  --border2: #d9ded6;
  /* Text */
  --text: #16211b;
  --text2: #65726b;
  --text3: #9aa49d;
  /* Accent */
  --blue: #0f9d63;
  --green: #0f9d63;
  --green-strong: #0a7d4d;
  --green-soft: #e4f4ec;
  --on-primary: #ffffff;
  /* Semantic */
  --red: #dd4248;
  --red-soft: #fbeaeb;
  --amber: #d68f22;
  --purple: #8a5cf6;
  --teal: #13a394;
  /* Shadow */
  --shadow: 0 1px 2px rgba(20,40,30,.04),0 6px 22px rgba(20,40,30,.05);
  --shadow-lg: 0 18px 50px rgba(20,40,30,.16);
  /* Category colors */
  --cat-logement: #3b6fe0;
  --cat-transport: #13a394;
  --cat-alimentation: #d68f22;
  --cat-soins: #d6457f;
  --cat-modedevie: #8a5cf6;
  --cat-loisirs: #ee6a2c;
  --cat-impots: #dd4248;
  --cat-voyage: #0f9d63;
  --radius: 16px;
}
html[data-theme="dark"] {
  --bg: #0e1512;
  --bg2: #1a2520;
  --bg3: #222e28;
  --bg4: #2a3830;
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.18);
  --text: #e9f0ea;
  --text2: #90a098;
  --text3: #5c6a62;
  --blue: #2ace83;
  --green: #2ace83;
  --green-strong: #3ee093;
  --green-soft: #15281f;
  --on-primary: #04241a;
  --red: #ff6b6f;
  --red-soft: #2a1719;
  --amber: #e6a63f;
  --purple: #a47cff;
  --teal: #28c0b1;
  --shadow: 0 1px 3px rgba(0,0,0,.5), 0 8px 28px rgba(0,0,0,.5);
  --shadow-lg: 0 22px 60px rgba(0,0,0,.7);
  --cat-logement: #6189ff;
  --cat-transport: #28c0b1;
  --cat-alimentation: #e6a63f;
  --cat-soins: #ef6aa0;
  --cat-modedevie: #a47cff;
  --cat-loisirs: #ff8a52;
  --cat-impots: #ff6b6f;
  --cat-voyage: #2ace83;
}
*, *::before, *::after { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease, box-shadow 0.3s ease !important; }
/* Theme toggle button */
.menu-toggle { display: none; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); width: 36px; height: 36px; border-radius: 8px; font-size: 18px; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
.sidebar-backdrop.open { display: block; }
.topbar-period { display:flex; align-items:center; gap:6px; background:var(--bg2); border:1px solid var(--border); border-radius:11px; padding:4px; justify-content:center; }
.theme-toggle { display:flex; align-items:center; gap:11px; padding:10px 12px; margin:6px 10px; border-radius:13px; background:var(--bg3); border:1px solid var(--border); cursor:pointer; width:calc(100% - 20px); transition: border-color 0.15s; }
.theme-toggle:hover { border-color: var(--border2); }
.theme-toggle-track { width:42px; height:24px; border-radius:20px; border:none; position:relative; flex-shrink:0; transition:background 0.25s !important; background: var(--border2); }
html[data-theme="dark"] .theme-toggle-track { background: var(--green) !important; }
.theme-toggle-thumb { position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:left 0.25s cubic-bezier(0.34,1.56,0.64,1) !important; box-shadow:0 1px 4px rgba(0,0,0,0.3); left: 3px; }
html[data-theme="dark"] .theme-toggle-thumb { left: 21px !important; }
.theme-toggle-label { font-size:13px; font-weight:600; color:var(--text2); flex:1; }
.theme-toggle-ico { font-size:15px; width:30px; height:30px; background:var(--green-soft); color:var(--green); border-radius:9px; display:flex; align-items:center; justify-content:center; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Hanken Grotesk', 'SF Pro Display', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

.layout { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 252px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-logo { padding: 20px 18px 16px; display:flex; align-items:center; gap:13px; border-bottom: 1px solid var(--border); cursor:default; }
.sidebar-logo-icon {
  width:42px; height:42px; border-radius:13px; flex-shrink:0;
  background: linear-gradient(145deg, #1fd98a 0%, #0f9d63 55%, #0a7d4d 100%);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.35) inset,
    0 -1px 0 rgba(0,0,0,0.2) inset,
    0 6px 18px rgba(15,157,99,0.5),
    0 2px 4px rgba(0,0,0,0.25);
}
.sidebar-logo-icon::before {
  content:'';
  position:absolute; top:-40%; left:-30%;
  width:80%; height:60%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.38) 0%, transparent 70%);
  border-radius:50%;
  transform: rotate(-20deg);
  pointer-events:none;
}
.sidebar-logo-icon svg { width:22px; height:22px; position:relative; z-index:1; }
.sidebar-logo-text {
  font-family:'Bricolage Grotesque','SF Pro Display',sans-serif;
  font-weight:800; font-size:21px; letter-spacing:-.03em;
  line-height:1;
}
.sidebar-logo-text .mon { color: var(--text); }
.sidebar-logo-text .bud {
  background: linear-gradient(135deg, #1fd98a 0%, #0f9d63 60%, #0a7d4d 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-logo-sub {
  font-size:10px; font-weight:600; color:var(--text3); letter-spacing:0.04em;
  text-transform:uppercase; margin-top:2px;
}
.sidebar-nav { padding: 8px 14px; flex: 1; overflow-y: auto; }
.nav-section { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); padding: 14px 10px 7px; }
/* ─── NAV ITEMS — BASE ─────────────────────────────────── */
@keyframes navEntrance { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
@keyframes activeShimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes activePulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(15,157,99,0); }
  50%      { box-shadow: 2px 0 14px 0 rgba(15,157,99,0.22); }
}
@keyframes iconWiggle {
  0%   { transform: rotate(0deg) scale(1); }
  20%  { transform: rotate(-12deg) scale(1.18); }
  40%  { transform: rotate(10deg) scale(1.12); }
  60%  { transform: rotate(-6deg) scale(1.08); }
  80%  { transform: rotate(3deg) scale(1.04); }
  100% { transform: rotate(0deg) scale(1); }
}
@keyframes iconFloat {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-3px); }
}
@keyframes hoverGlow {
  from { opacity:0; transform: translateX(-100%); }
  to   { opacity:1; transform: translateX(100%); }
}

.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: 11px; cursor: pointer; color: var(--text2);
  font-size: 13.5px; font-weight: 500;
  margin-bottom: 2px; border: none; background: none; width: 100%;
  text-align: left; position: relative; overflow: hidden;
  transition: color 0.18s ease, background 0.18s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1) !important;
}
/* entrance stagger applied via JS --i variable */
.nav-item { animation: navEntrance 0.35s ease calc(var(--i,0)*0.06s) both; }

/* sweep highlight on hover */
.nav-item::before {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
  transform: translateX(-100%); opacity:0;
  transition: none; pointer-events:none; border-radius:11px;
}
.nav-item:hover::before { animation: hoverGlow 0.45s ease both; }
.nav-item:hover {
  background: var(--bg3); color: var(--text);
  transform: translateX(4px) !important;
}
.nav-item:hover .ico { animation: iconWiggle 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
.nav-item:active { transform: translateX(2px) scale(0.98) !important; }

/* active state with shimmer */
.nav-item.active {
  background: var(--green-soft); color: var(--green); font-weight: 600;
  border-left: 2.5px solid var(--green);
  padding-left: 9.5px;
  animation: navEntrance 0.35s ease calc(var(--i,0)*0.06s) both, activePulse 2.8s ease-in-out infinite;
}
.nav-item.active::after {
  content:''; position:absolute; inset:0; border-radius:11px; pointer-events:none;
  background: linear-gradient(90deg, transparent 0%, rgba(15,157,99,0.12) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: activeShimmer 3s linear infinite;
}
.nav-item.active .ico { animation: iconFloat 2.5s ease-in-out infinite; }

.nav-item .ico { font-size: 15px; width: 20px; text-align: center; display:inline-block; transition: transform 0.2s !important; }
.sidebar-footer { padding: 14px; border-top: 1px solid var(--border); }
.month-nav { display: flex; align-items: center; gap: 4px; }
.month-nav button { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-size: 16px; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: background 0.15s; }
.month-nav button:hover { background: var(--bg4); }
.month-nav span { flex: 1; font-size: 13px; font-weight: 600; text-align: center; color: var(--text); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; flex-shrink: 0; }
.topbar-title { font-family: 'Bricolage Grotesque','SF Pro Display',sans-serif; font-size: 22px; font-weight: 600; letter-spacing: -.02em; }
.topbar-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn { background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); border-radius: 11px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; display:inline-flex;align-items:center;gap:6px; }
.btn::after { content:''; position:absolute; inset:0; background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.15) 0%, transparent 60%); opacity:0; transition:opacity 0.3s; pointer-events:none; border-radius:inherit; }
.btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--green); border-color: var(--green); color: var(--on-primary); font-weight:700; box-shadow: 0 6px 16px rgba(15,157,99,0.36); }
.btn.primary:hover { background: var(--green-strong); border-color: var(--green-strong); box-shadow: 0 8px 20px rgba(15,157,99,0.45); }
.btn.primary:active { transform: scale(0.97); box-shadow: none; }
.btn-danger { background:var(--red-soft); border:1px solid rgba(221,66,72,0.3); color:var(--red); border-radius:11px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; transition: all 0.15s; }
.btn-danger:hover { background:rgba(221,66,72,0.18); }
.btn-danger:active { transform: scale(0.97); }
.cat-add-btn { background: var(--green-soft); border: 1px solid rgba(15,157,99,0.25); color: var(--green); font-size: 16px; font-weight: 700; cursor: pointer; width: 22px; height: 22px; border-radius: 7px; line-height: 1; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1) !important; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-right: 8px; padding: 0; }
.cat-add-btn:hover { background: var(--green); color: var(--on-primary); border-color: var(--green); transform: scale(1.2) rotate(90deg); box-shadow: 0 2px 10px rgba(15,157,99,0.4); }
.cat-add-btn:active { transform: scale(0.95) rotate(90deg); }

.content { flex: 1; overflow-y: auto; padding: 26px 30px 60px; }
.content::-webkit-scrollbar { width: 8px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 20px; border: 2px solid var(--bg); }

/* SUMMARY CARDS */
.cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 20px; }
.card { background: var(--bg2); border: 1.5px solid var(--border2); border-radius: 18px; padding: 20px; box-shadow: 0 1px 3px rgba(20,40,30,.06), 0 8px 28px rgba(20,40,30,.09); }
.card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 12px; }
.card-value { font-family: 'Bricolage Grotesque','SF Pro Display',sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
.card-value.green { color: var(--green); }
.card-value.red { color: var(--red); }
.card-sub { font-size: 12px; color: var(--text2); margin-top: 6px; }

/* 2-col layout */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 20px; }
.panel { background: var(--bg2); border: 1.5px solid var(--border2); border-radius: 18px; overflow: hidden; box-shadow: 0 1px 3px rgba(20,40,30,.06), 0 8px 28px rgba(20,40,30,.09); }
.panel-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-family: 'Bricolage Grotesque','SF Pro Display',sans-serif; font-size: 15px; font-weight: 700; }

/* BARS */
.bars-inner { padding: 14px 18px; }
.bar-row { margin-bottom: 11px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-meta { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.bar-meta-left { color: var(--text2); }
.bar-meta-right { color: var(--text); font-weight: 600; }
.bar-track { background: var(--border); border-radius: 3px; height: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }

/* INCOMES PANEL */
.income-row { display: flex; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); gap:12px; }
.income-row:last-child { border-bottom: none; }
.income-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--green-soft); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink:0; }
.income-name { flex: 1; font-size: 14px; color: var(--text); font-weight:500; }
.income-input { background: var(--bg3); border: 1px solid var(--border); color: var(--green); font-size: 15px; font-weight: 700; text-align: right; width: 120px; border-radius: 9px; padding: 7px 12px; font-family: inherit; outline: none; }
.income-input:focus { border-color: var(--green); }

/* CATEGORIES TABLE */
.cat-table { width: 100%; border-collapse: collapse; }
.cat-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text3); padding: 0 18px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.cat-table th:last-child { text-align: right; }
.cat-row { cursor: pointer; transition: background 0.1s; }
.cat-row:hover td { background: var(--bg3); }
.cat-row td { padding: 11px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.cat-row:last-child td { border-bottom: none; }
.cat-cell-name { display: flex; align-items: center; gap: 10px; }
.cat-cell-ico { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.cat-cell-label { font-size: 13px; font-weight: 600; }
.cat-cell-pct { font-size: 12px; color: var(--text3); width: 80px; }
.cat-cell-amt { font-size: 13px; font-weight: 700; text-align: right; }
.mini-bar { background: var(--bg3); border-radius: 2px; height: 4px; overflow: hidden; width: 80px; }
.mini-fill { height: 100%; border-radius: 2px; }
.sub-rows td { padding: 7px 18px 7px 54px; font-size: 12px; color: var(--text3); border-bottom: 1px solid var(--border); background: var(--bg3); }
.sub-rows td:last-child { text-align: right; font-weight: 600; color: var(--text); }
.sub-rows:last-child td { border-bottom: none; }
.hidden { display: none; }

/* HISTORY TABLE */
.hist-table { width: 100%; border-collapse: collapse; }
.hist-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text3); padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
.hist-table td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
.hist-table tr:last-child td { border-bottom: none; }
.hist-table tr:hover td { background: var(--bg3); }
.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; }
.del-btn:hover { color: var(--red); background: rgba(240,96,96,0.1); }

/* GLOBAL */
.global-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.month-table { width: 100%; border-collapse: collapse; }
.month-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text3); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
.month-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
.month-table tr:last-child td { border-bottom: none; }
.month-table tr.current td { background: rgba(79,142,247,0.06); }
.pos { color: var(--green); font-weight: 700; }
.neg { color: var(--red); font-weight: 700; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
.modal-bg.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 420px; box-shadow: var(--shadow-lg); animation: pop .25s ease both; }
.modal h3 { font-family:'Bricolage Grotesque','SF Pro Display',sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); display: block; margin-bottom: 6px; margin-top: 16px; }
.modal label:first-of-type { margin-top: 0; }
.modal select, .modal input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 13px; font-family: inherit; outline: none; }
.modal select:focus, .modal input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
.modal-btns { display: flex; gap: 10px; margin-top: 22px; }
.modal-btns .btn { flex: 1; text-align: center; padding: 11px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: var(--on-primary); padding: 11px 22px; border-radius: 50px; font-size: 13.5px; font-weight: 700; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; box-shadow: 0 8px 24px rgba(15,157,99,0.4); }
.toast.show { opacity: 1; }

/* EMPTY */
.empty-state { padding: 40px; text-align: center; color: var(--text3); }
.empty-state div { font-size: 32px; margin-bottom: 10px; }

/* BUDGET PREVISIONNEL */
.budget-bar-row { margin-bottom:10px; }
.budget-bar-meta { display:flex; justify-content:space-between; align-items:center; font-size:12px; margin-bottom:4px; }
.budget-bar-track { background:var(--border); border-radius:4px; height:8px; overflow:hidden; position:relative; }
.budget-bar-fill { height:100%; border-radius:4px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1), background-color 0.5s; }
.budget-over { color:var(--red); font-weight:700; }
.budget-ok { color:var(--green); }
.budget-warn { color:var(--amber); }

/* BUDGET CARD — feedback visuel progressif */
.bud-card { background:var(--bg3); border-radius:10px; padding:11px 13px; border:1px solid var(--border); transition:border-color 0.4s, box-shadow 0.4s; position:relative; overflow:hidden; }
.bud-card::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.4s; pointer-events:none; border-radius:10px; }
.bud-card.warn::before { background:rgba(245,166,35,0.06); opacity:1; }
.bud-card.over::before { background:rgba(240,96,96,0.08); opacity:1; }
.bud-card.warn { border-color:rgba(245,166,35,0.35); }
.bud-card.over { border-color:rgba(240,96,96,0.45); box-shadow:0 0 0 1px rgba(240,96,96,0.15); }
/* Barre avec dégradé vert→orange→rouge selon %, animée */
.bud-bar-fill-live { height:100%; border-radius:4px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1); }

/* HISTORY TABLE — sort headers */
.hist-table th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--text3); padding:10px 16px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
.hist-th-sort { cursor:pointer; user-select:none; transition:color 0.15s; }
.hist-th-sort:hover { color:var(--text); }
.hist-th-sort.active { color:var(--blue); }
.sort-arrow { display:inline-block; font-size:10px; margin-left:3px; opacity:0.7; }

/* COMPARATIF ANNUEL */
.comp-annual-wrap { overflow-x:auto; }
.comp-annual-table { width:100%; border-collapse:collapse; min-width:900px; }
.comp-annual-table th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--text3); padding:9px 10px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; background:var(--bg3); z-index:2; }
.comp-annual-table th:first-child { text-align:left; position:sticky; left:0; z-index:3; background:var(--bg3); min-width:140px; }
.comp-annual-table td { padding:9px 10px; border-bottom:1px solid var(--border); font-size:12px; text-align:right; white-space:nowrap; }
.comp-annual-table td:first-child { text-align:left; position:sticky; left:0; background:var(--bg2); z-index:1; font-size:13px; font-weight:600; }
.comp-annual-table tr:hover td { background:var(--bg3); }
.comp-annual-table tr:hover td:first-child { background:var(--bg3); }
.comp-annual-table tr.comp-total td { background:var(--bg3); font-weight:700; font-size:13px; border-top:1px solid var(--border2); }
.comp-annual-table tr.comp-total td:first-child { background:var(--bg3); }
.comp-annual-table td.cur-month { background:rgba(15,157,99,0.08) !important; font-weight:700; }
.comp-annual-table th.cur-month { background:rgba(15,157,99,0.18) !important; color:var(--green); }
.comp-annual-table td.empty-cell { color:var(--text3); font-weight:400; }
.comp-annual-table td.up { color:var(--red); }
.comp-annual-table td.down { color:var(--green); }
.comp-mode-tabs { display:flex; gap:6px; padding:12px 16px 0; }
.comp-mode-tab { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:4px 12px; font-size:12px; font-weight:600; color:var(--text3); cursor:pointer; transition:all 0.15s; }
.comp-mode-tab.active { background:rgba(79,142,247,0.15); border-color:var(--blue); color:var(--blue); }
/* COMPARATIF N vs N-1 (legacy, kept for compat) */
.comp-row { display:flex; align-items:center; padding:9px 16px; border-bottom:1px solid var(--border); font-size:13px; }
.comp-row:last-child { border-bottom:none; }
.comp-cat { flex:1; display:flex; align-items:center; gap:8px; }
.comp-n1 { width:100px; text-align:right; color:var(--text3); }
.comp-n { width:100px; text-align:right; font-weight:600; }
.comp-delta { width:80px; text-align:right; font-size:12px; font-weight:700; }
.comp-delta.up { color:var(--red); }
.comp-delta.down { color:var(--green); }
.comp-delta.neutral { color:var(--text3); }

/* RIPPLE */
@keyframes ripple { to { transform: translate(-50%,-50%) scale(1); opacity: 0; } }

/* CAT ADD BTN */
.cat-add-btn { background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.35); color: #4f8ef7; font-size: 16px; font-weight: 700; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; line-height: 1; transition: all 0.15s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-right: 8px; padding: 0; }
.cat-add-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); transform: scale(1.15); }

/* RESET BTN */
.btn-danger { background:rgba(240,96,96,0.1); border:1px solid rgba(240,96,96,0.3); color:var(--red); border-radius:8px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn-danger:hover { background:rgba(240,96,96,0.2); }

/* SAVINGS CARD */
.savings-card { grid-column:span 2; background: linear-gradient(150deg, var(--green) 0%, var(--green-strong) 100%); border:none; border-radius:18px; padding:20px; display:flex; align-items:center; gap:20px; box-shadow: 0 12px 30px rgba(15,157,99,0.32); color: var(--on-primary); }
.savings-card .card-label { color: rgba(255,255,255,0.85); }
.savings-card .card-value { color: var(--on-primary); font-family:'Bricolage Grotesque','SF Pro Display',sans-serif; }
.savings-card .card-sub { color: rgba(255,255,255,0.8); }
.savings-main { display:flex; flex-direction:column; }
.savings-bar-wrap { flex:1; }
.savings-bar-track { background: rgba(255,255,255,0.22); border-radius:6px; height:9px; overflow:hidden; margin-top:8px; }
.savings-bar-fill { height:100%; border-radius:6px; background: var(--on-primary); transition:width 0.6s; }

/* COMBO BAR CHART */
.combo-legend { display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; }
.combo-leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); }
.combo-leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

/* IMPORT MODAL */
.import-cat-header { padding:8px 12px; background:var(--bg3); border-radius:8px; font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; margin-top:10px; display:flex; align-items:center; gap:8px; }
.import-cat-header:first-child { margin-top:0; }
.import-row { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:7px; cursor:pointer; transition:background 0.1s; border:1px solid transparent; margin-bottom:3px; }
.import-row:hover { background:var(--bg3); }
.import-row.selected { background:rgba(79,142,247,0.08); border-color:rgba(79,142,247,0.25); }
.import-check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border2); background:var(--bg3); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; transition:all 0.1s; }
.import-row.selected .import-check { background:var(--blue); border-color:var(--blue); color:white; }
.import-subname { flex:1; font-size:13px; color:var(--text); }
.import-amt { font-size:13px; font-weight:700; color:var(--text2); }
.import-input { background:var(--bg3); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:13px; font-weight:700; padding:3px 8px; width:90px; text-align:right; font-family:inherit; outline:none; }
.import-input:focus { border-color:var(--blue); }
.import-empty { text-align:center; padding:30px; color:var(--text3); font-size:13px; }

/* GLOBAL VIEW */
.global-month-tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.gm-tab { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:5px 12px; font-size:12px; font-weight:600; color:var(--text3); cursor:pointer; transition:all 0.15s; }
.gm-tab:hover { background:var(--bg3); color:var(--text); }
.gm-tab.active { background:rgba(79,142,247,0.15); border-color:var(--blue); color:var(--blue); }
.gm-tab.has-data { color:var(--text2); }
.global-detail { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.pie-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; display:flex; flex-direction:column; align-items:center; }
.pie-title { font-size:13px; font-weight:700; margin-bottom:16px; align-self:flex-start; }
.pie-svg { display:block; overflow:visible; }
.pie-legend { width:100%; margin-top:14px; display:flex; flex-direction:column; gap:5px; }
.pie-leg-row { display:flex; align-items:center; gap:8px; font-size:12px; cursor:pointer; padding:4px 6px; border-radius:6px; transition:background 0.1s; }
.pie-leg-row:hover { background:var(--bg3); }
.pie-leg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.pie-leg-name { flex:1; color:var(--text2); }
.pie-leg-amt { font-weight:700; color:var(--text); }
.pie-leg-pct { color:var(--text3); font-size:11px; width:34px; text-align:right; }
.pie-empty { color:var(--text3); font-size:13px; text-align:center; padding:40px 0; }
.detail-right { display:flex; flex-direction:column; gap:12px; }
.gm-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.slice { cursor:pointer; transition:opacity 0.15s; }
.slice:hover { opacity:0.85; }

/* TENDANCE */
.trend { font-size:12px; font-weight:700; display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:20px; margin-top:6px; }
.trend.up { color:#f06060; background:rgba(240,96,96,0.1); }
.trend.down { color:#22c97a; background:rgba(34,201,122,0.1); }
.trend.stable { color:#7d8499; background:rgba(125,132,153,0.1); }

/* FILTRE HISTORIQUE */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.filter-chip { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:600; color:var(--text3); cursor:pointer; transition:all 0.15s; }
.filter-chip:hover { color:var(--text); border-color:var(--border2); }
.filter-chip.active { background:rgba(79,142,247,0.12); border-color:var(--blue); color:var(--blue); }

/* KBD HINT */
.kbd { display:inline-block; background:var(--bg3); border:1px solid var(--border2); border-radius:4px; padding:1px 5px; font-size:10px; font-family:monospace; color:var(--text3); }

/* EDITABLE AMOUNT */
.edit-amt { color:var(--red); font-size:13px; font-weight:700; font-family:inherit; outline:none; cursor:text; transition:all 0.18s; }
.edit-amt:focus { border-color:var(--blue) !important; border-style:solid !important; }
/* MÉMO DU MOIS */
.memo-panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px; }
.memo-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.memo-title { font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
.memo-saved { font-size:10px; color:var(--green); opacity:0; transition:opacity 0.4s; }
.memo-saved.show { opacity:1; }
.memo-textarea { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; font-family:inherit; padding:10px 12px; resize:vertical; min-height:72px; outline:none; line-height:1.5; transition:border-color 0.2s; }
.memo-textarea:focus { border-color:var(--blue); }
.memo-textarea::placeholder { color:var(--text3); font-style:italic; }


/* PREV MONTH LABEL */
.prev-month-badge { font-size:10px; color:var(--text3); background:var(--bg3); border-radius:4px; padding:2px 6px; margin-left:6px; font-style:italic; }
/* CATEGORIES MANAGER */
.cat-manager { max-width: 860px; }
.cat-manager-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-top: 16px; }
.cat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.cat-card-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.cat-card-icon { font-size: 18px; }
.cat-card-title { flex: 1; font-size: 14px; font-weight: 700; }
.cat-card-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
.cat-card-del:hover { color: var(--red); background: rgba(240,96,96,0.1); }
.cat-card-subs { padding: 8px 12px; }
.sub-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text2); margin: 3px; }
.sub-tag-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 11px; line-height: 1; padding: 0 0 0 2px; transition: color 0.15s; }
.sub-tag-del:hover { color: var(--red); }
.sub-add-row { display: flex; gap: 6px; padding: 6px 12px 12px; }
.sub-add-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-size: 13px; padding: 6px 10px; font-family: inherit; outline: none; }
.sub-add-input:focus { border-color: var(--blue); }
.sub-add-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.sub-add-btn:hover { background: var(--bg4); color: var(--text); }
.new-cat-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-top: 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.new-cat-bar input, .new-cat-bar select { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 13px; padding: 8px 12px; font-family: inherit; outline: none; }
.new-cat-bar input:focus, .new-cat-bar select:focus { border-color: var(--blue); }

/* FAB – bouton flottant */
.fab { position:fixed; bottom:28px; right:28px; width:56px; height:56px; border-radius:50%; background:var(--blue); border:none; color:#fff; font-size:28px; line-height:1; cursor:pointer; box-shadow:0 4px 20px rgba(79,142,247,0.55); display:flex; align-items:center; justify-content:center; z-index:90; transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, background 0.2s; }
.fab:hover { transform:scale(1.12) rotate(90deg); box-shadow:0 6px 28px rgba(79,142,247,0.7); background:#5f9bf8; }
.fab:active { transform:scale(0.95) rotate(90deg); }
.fab-tooltip { position:fixed; bottom:34px; right:90px; background:var(--bg4); color:var(--text); font-size:12px; font-weight:600; padding:5px 10px; border-radius:8px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.18s; z-index:89; box-shadow:0 2px 8px rgba(0,0,0,0.3); border:1px solid var(--border2); }
.fab:hover ~ .fab-tooltip, .fab:focus ~ .fab-tooltip { opacity:1; }

/* CONFIRM MODAL custom */
.confirm-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; z-index:150; }
.confirm-modal-bg.open { display:flex; }
.confirm-modal { background:var(--bg2); border:1px solid var(--border2); border-radius:18px; padding:28px 28px 22px; width:360px; max-width:90vw; box-shadow:0 12px 48px rgba(0,0,0,0.45); animation:modalPop 0.22s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes modalPop { from { opacity:0; transform:scale(0.88) translateY(10px); } to { opacity:1; transform:none; } }
.confirm-modal-icon { font-size:36px; text-align:center; margin-bottom:10px; }
.confirm-modal-title { font-size:17px; font-weight:800; color:var(--text); text-align:center; margin-bottom:8px; }
.confirm-modal-body { font-size:13px; color:var(--text2); text-align:center; line-height:1.55; margin-bottom:22px; }
.confirm-modal-btns { display:flex; gap:10px; }
.confirm-modal-btns .btn { flex:1; text-align:center; padding:11px; font-size:14px; }
.confirm-modal-btns .btn-danger { flex:1; text-align:center; padding:11px; font-size:14px; border-radius:8px; }


/* COURBE D'ÉVOLUTION */
.trend-chart-wrap { overflow-x:auto; }
.trend-svg { overflow:visible; display:block; }
.trend-line { fill:none; stroke-width:2; stroke-linejoin:round; stroke-linecap:round; transition:opacity 0.2s; }
.trend-dot { transition:r 0.15s; cursor:pointer; }
.trend-dot:hover { r:5; }
.trend-legend { display:flex; flex-wrap:wrap; gap:8px 16px; margin-top:12px; }
.trend-leg-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); cursor:pointer; padding:3px 7px; border-radius:6px; transition:background 0.12s; user-select:none; }
.trend-leg-item:hover { background:var(--bg3); }
.trend-leg-item.faded { opacity:0.3; }
.trend-leg-dot { width:10px; height:3px; border-radius:2px; flex-shrink:0; }

/* TABLEAU MOYENNES */
.avg-table { width:100%; border-collapse:collapse; }
.avg-table th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--text3); padding:8px 14px; text-align:left; border-bottom:1px solid var(--border); }
.avg-table th:not(:first-child) { text-align:right; }
.avg-table td { padding:9px 14px; border-bottom:1px solid var(--border); font-size:13px; }
.avg-table tr:last-child td { border-bottom:none; }
.avg-table tr:hover td { background:var(--bg3); }
.avg-table td:not(:first-child) { text-align:right; }
.avg-table tr.avg-total td { background:var(--bg3); font-weight:700; border-top:1px solid var(--border2); }
.avg-mini-bar { display:inline-block; height:4px; border-radius:2px; vertical-align:middle; margin-left:6px; }

/* ============ RESPONSIVE — TABLETTE (≤1024px) ============ */
@media (max-width: 1024px) {
  .menu-toggle { display: flex; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 8px 0 30px rgba(0,0,0,0.4);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar .nav-item { padding: 12px 14px; font-size: 14px; }
  .cards-row { grid-template-columns: repeat(2, 1fr) !important; }
  .topbar {
    display: flex; flex-wrap: wrap; height: auto;
    padding: 10px 14px; gap: 10px; row-gap: 10px; align-items: center;
  }
  .topbar-actions { flex-basis: 100%; flex-wrap: wrap; justify-content: flex-start; }
}

/* ============ RESPONSIVE — MOBILE (≤640px) ============ */
@media (max-width: 640px) {
  .topbar {
    display: flex; flex-wrap: wrap; height: auto;
    padding: 10px 12px; gap: 8px; row-gap: 8px;
  }
  .topbar-title { font-size: 14px; order: 1; flex: 1; }
  .topbar-period { order: 3; flex-basis: 100%; padding: 5px 6px; }
  .topbar-period #month-label { min-width: 78px !important; font-size: 12px !important; }
  .topbar-actions { order: 4; flex-basis: 100%; flex-wrap: wrap; justify-content: flex-start; gap: 6px; }
  .topbar-actions .btn, .topbar-actions .btn-danger, .topbar-actions .btn.primary {
    flex: 1 1 auto; font-size: 12px; padding: 8px 10px; white-space: nowrap;
  }
  .content { padding: 12px; }
  .cards-row { grid-template-columns: 1fr 1fr !important; gap: 8px; }
  .card { padding: 12px 14px; }
  .card-value { font-size: 19px; }
  .two-col, .global-grid, .global-detail, .gm-cards, .annual-pie-row { grid-template-columns: 1fr !important; }
  .cat-manager-grid { grid-template-columns: 1fr; gap: 12px; }
  .modal { width: 92vw; max-width: 400px; max-height: 88vh; overflow-y: auto; padding: 18px; }
  .income-input { width: 100px; }
  .sub-add-row { flex-wrap: wrap; }
  .sub-add-btn { flex: 1 1 auto; }
  .sub-add-input { flex: 1 1 140px; }
  .cat-table, .hist-table, .month-table {
    display: block; overflow-x: auto; white-space: nowrap;
  }
  .modal-btns { flex-wrap: wrap; }
  .modal-btns .btn { flex: 1 1 100%; }
  .panel svg, .pie-wrap svg, .card svg, .savings-card svg { max-width: 100%; height: auto; display: block; }
}
/* ============ LOGO ANIMATIONS ============ */
@keyframes logoFloat {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-6px) rotate(2deg); }
}
@keyframes logoPop {
  0% { transform: scale(0) rotate(-20deg); opacity:0; }
  60% { transform: scale(1.18) rotate(4deg); opacity:1; }
  80% { transform: scale(0.95) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); opacity:1; }
}
@keyframes logoGlow {
  0%,100% { box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 -1px 0 rgba(0,0,0,0.2) inset, 0 6px 18px rgba(15,157,99,0.45), 0 2px 4px rgba(0,0,0,0.25); }
  50% { box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 -1px 0 rgba(0,0,0,0.2) inset, 0 8px 32px rgba(15,157,99,0.75), 0 0 0 5px rgba(15,157,99,0.13), 0 2px 4px rgba(0,0,0,0.25); }
}
@keyframes textReveal {
  0% { opacity:0; transform:translateX(-14px); }
  100% { opacity:1; transform:translateX(0); }
}
@keyframes splashIn {
  0% { opacity:0; transform:scale(0.85) translateY(20px); }
  100% { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes splashIconBounce {
  0%   { transform:scale(0) rotate(-30deg); opacity:0; }
  55%  { transform:scale(1.22) rotate(6deg); opacity:1; }
  72%  { transform:scale(0.93) rotate(-3deg); }
  85%  { transform:scale(1.06) rotate(2deg); }
  100% { transform:scale(1) rotate(0); opacity:1; }
}
@keyframes splashTextSlide {
  0% { opacity:0; transform:translateY(22px); }
  100% { opacity:1; transform:translateY(0); }
}
@keyframes splashTagline {
  0% { opacity:0; transform:translateY(10px); }
  100% { opacity:0.75; transform:translateY(0); }
}
@keyframes splashBar {
  0% { width:0; }
  100% { width:100%; }
}
@keyframes splashFadeOut {
  0% { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(1.04); pointer-events:none; }
}
@keyframes splashDot {
  0%,80%,100% { transform:scale(0.6); opacity:0.3; }
  40% { transform:scale(1); opacity:1; }
}

/* Sidebar logo hover */
.sidebar-logo-icon {
  animation: logoGlow 3s ease-in-out infinite;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1) !important;
}
.sidebar-logo:hover .sidebar-logo-icon {
  transform: scale(1.1) rotate(-6deg) !important;
  animation: logoFloat 1.8s ease-in-out infinite !important;
}
.sidebar-logo-text { animation: textReveal 0.5s ease 0.1s both; }

/* Splash screen */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(145deg, #0a1a10 0%, #0e2318 40%, #0f9d63 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0;
}
#splash.hiding { animation: splashFadeOut 0.65s cubic-bezier(0.4,0,0.2,1) both; }
.splash-icon {
  width: 110px; height: 110px; border-radius: 32px;
  background: linear-gradient(145deg, #1fd98a 0%, #0f9d63 55%, #0a7d4d 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.3) inset,
    0 -2px 0 rgba(0,0,0,0.2) inset,
    0 24px 60px rgba(15,157,99,0.6),
    0 8px 20px rgba(0,0,0,0.4);
  animation: splashIconBounce 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both,
             logoGlow 2.5s ease-in-out 1s infinite;
  margin-bottom: 28px;
}
.splash-icon::before {
  content:''; position:absolute; top:-50%; left:-20%;
  width:75%; height:65%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
  border-radius:50%; transform: rotate(-15deg);
}
.splash-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 52px; font-weight: 800; letter-spacing: -0.03em;
  color: #fff;
  animation: splashTextSlide 0.5s ease 0.55s both;
  margin-bottom: 10px;
}
.splash-title span { color: #2ace83; }
.splash-tagline {
  font-family: 'Hanken Grotesk', sans-serif;
  font-size: 16px; font-weight: 500; color: #fff;
  animation: splashTagline 0.5s ease 0.8s both;
  margin-bottom: 44px;
  letter-spacing: 0.02em;
}
.splash-bar-wrap {
  width: 200px; height: 3px; background: rgba(255,255,255,0.15);
  border-radius: 2px; overflow: hidden;
  animation: splashTextSlide 0.3s ease 0.9s both;
}
.splash-bar {
  height: 100%; background: #2ace83; border-radius: 2px;
  animation: splashBar 2s cubic-bezier(0.4,0,0.2,1) 1s both;
}
.splash-dots {
  display: flex; gap: 7px; margin-top: 18px;
  animation: splashTextSlide 0.3s ease 1s both;
}
.splash-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.5);
}
.splash-dots span:nth-child(1) { animation: splashDot 1.2s ease 1.1s infinite; }
.splash-dots span:nth-child(2) { animation: splashDot 1.2s ease 1.3s infinite; }
.splash-dots span:nth-child(3) { animation: splashDot 1.2s ease 1.5s infinite; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:52px;height:52px;position:relative;z-index:1">
      <rect x="2" y="7" width="20" height="14" rx="3.5" fill="rgba(255,255,255,0.25)"/>
      <path d="M2 11h20" stroke="rgba(255,255,255,0.55)" stroke-width="1.8"/>
      <rect x="14" y="13" width="6" height="4" rx="2" fill="rgba(255,255,255,0.9)"/>
      <circle cx="16.5" cy="15" r="1.1" fill="rgba(10,80,45,0.7)"/>
      <path d="M7 4h10a2 2 0 0 1 2 2v1H5V6a2 2 0 0 1 2-2z" fill="rgba(255,255,255,0.3)"/>
    </svg>
  </div>
  <div class="splash-title">Mon<span>Budget</span></div>
  <div class="splash-tagline">Votre budget familial, simplement.</div>

</div>

<div class="layout" id="app-root">
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="7" width="20" height="14" rx="3.5" fill="rgba(255,255,255,0.22)"/>
          <path d="M2 11h20" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
          <rect x="14" y="13" width="6" height="4" rx="2" fill="rgba(255,255,255,0.85)"/>
          <circle cx="16.5" cy="15" r="1" fill="rgba(15,100,60,0.7)"/>
          <path d="M7 4h10a2 2 0 0 1 2 2v1H5V6a2 2 0 0 1 2-2z" fill="rgba(255,255,255,0.28)"/>
        </svg>
      </div>
      <div>
        <div class="sidebar-logo-text"><span class="mon">Mon</span><span class="bud">Budget</span></div>
        <div class="sidebar-logo-sub">Gestion familiale</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Navigation</div>
      <button class="nav-item active" style="--i:0" onclick="showView('dashboard',this)"><span class="ico">📊</span> Tableau de bord</button>
      <button class="nav-item" style="--i:1" onclick="showView('history',this)"><span class="ico">📋</span> Historique</button>
      <button class="nav-item" style="--i:2" onclick="showView('global',this)"><span class="ico">🌐</span> Vue globale</button>
      <button class="nav-item" style="--i:3" onclick="showView('categories',this)"><span class="ico">⚙️</span> Gérer les catégories</button>

    </div>
    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
        <span class="theme-toggle-ico" id="theme-ico">🌙</span>
        <span class="theme-toggle-label" id="theme-label">Thème sombre</span>
        <div class="theme-toggle-track"><div class="theme-toggle-thumb"></div></div>
      </button>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        <span class="kbd">N</span><span style="font-size:10px;color:var(--text3)"> Nouvelle dépense</span>
        <span class="kbd">Esc</span><span style="font-size:10px;color:var(--text3)"> Fermer</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()" title="Menu" aria-label="Ouvrir le menu">&#9776;</button>
      <div class="topbar-title" id="view-title">Tableau de bord</div>
      <div class="topbar-period" style="">
        <div class="month-nav" style="gap:4px">
          <button onclick="changeYear(-1)" style="width:24px;height:24px;font-size:14px">&#8249;</button>
          <span id="year-label" style="font-size:14px;font-weight:800;color:var(--blue);min-width:36px;text-align:center"></span>
          <button onclick="changeYear(1)" style="width:24px;height:24px;font-size:14px">&#8250;</button>
        </div>
        <div style="width:1px;height:20px;background:var(--border2)"></div>
        <div class="month-nav" style="gap:4px">
          <button onclick="changeMonth(-1)" style="width:24px;height:24px;font-size:14px">&#8249;</button>
          <span id="month-label" style="min-width:90px;text-align:center;font-size:13px;font-weight:600"></span>
          <button onclick="changeMonth(1)" style="width:24px;height:24px;font-size:14px">&#8250;</button>
        </div>
      </div>
      <div class="topbar-actions" id="topbar-actions">
        <button class="btn" onclick="backupData()" title="Sauvegarder toutes les données en fichier JSON">💾 Sauvegarde</button>
        <button class="btn" onclick="restoreData()" title="Restaurer une sauvegarde JSON">📂 Restaurer</button>
        <button class="btn" onclick="exportExcel()" title="Exporter les données visionnées en Excel">⬇ Export Excel</button>
        <button class="btn" id="btn-export-pdf" onclick="exportPDF()" title="Exporter le tableau de bord en PDF">📄 Export PDF</button>
        <div id="history-actions" style="display:none">
          <button class="btn-danger" onclick="confirmReset()">🗑 Remise à zéro du mois</button>
        </div>
        <button class="btn" onclick="openImportModal()" title="Reprendre les montants du mois précédent">⚡ Saisie auto</button>
        <button class="btn primary" onclick="openModal()">+ Ajouter une dépense</button>
      </div>
    </div>
    <div class="content">
      <div id="view-dashboard"></div>
      <div id="view-history" style="display:none"></div>
      <div id="view-global" style="display:none"></div>
      <div id="view-categories" style="display:none"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <h3 style="margin-bottom:0">Ajouter une dépense</h3>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="modal-counter" style="font-size:11px;color:var(--text3);display:none"></span>
        <button onclick="closeModal()" title="Fermer" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1;transition:all 0.15s;" onmouseover="this.style.background='var(--bg4)';this.style.color='var(--text)'" onmouseout="this.style.background='var(--bg3)';this.style.color='var(--text2)'">&#x2715;</button>
      </div>
    </div>
    <label>Catégorie</label>
    <select id="m-cat" onchange="updateSubs()"></select>
    <label>Sous-catégorie</label>
    <select id="m-sub"></select>
    <label>Montant (€)</label>
