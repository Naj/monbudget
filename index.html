      <div class="cat-card-header" style="border-left:3px solid ${cat.color}">
        <span class="cat-card-icon">${cat.icon}</span>
        <span class="cat-card-title">${cat.label}</span>
        ${usedCount>0?`<span style="font-size:10px;color:var(--text3);margin-right:4px">${usedCount} d&eacute;p.</span>`:''}
        <button onclick="toggleCatEdit(${ci})" title="Modifier l'intitul&eacute; et la couleur"
          style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;transition:all 0.15s;margin-right:2px"
          onmouseover="this.style.color='var(--blue)';this.style.background='rgba(79,142,247,0.1)'"
          onmouseout="this.style.color='var(--text3)';this.style.background='none'">&#9998;</button>
        <button class="cat-card-del" onclick="deleteCat(${ci})" title="Supprimer la cat&eacute;gorie">&#x1F5D1;</button>
      </div>
      <div id="cat-edit-${ci}" style="display:none;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;align-items:center">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%">
          <select id="cat-edit-icon-${ci}" style="background:var(--bg4);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:14px;padding:5px 8px;font-family:inherit;outline:none;width:70px">${iconOpts2}</select>
          <input id="cat-edit-label-${ci}" value="${cat.label}" style="flex:1;min-width:120px;background:var(--bg4);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;font-weight:700;padding:6px 10px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')saveCatEdit(${ci})">
          <button onclick="saveCatEdit(${ci})" style="background:var(--blue);border:none;color:#fff;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">✓ OK</button>
          <button onclick="toggleCatEdit(${ci})" style="background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer">Annuler</button>
        </div>

      </div>
      <div class="cat-card-subs">${subsHtml||'<span style="font-size:12px;color:var(--text3);padding:4px">Aucune sous-cat&eacute;gorie</span>'}</div>
      <div class="sub-add-row">
        <input class="sub-add-input" id="sub-input-${ci}" placeholder="Nouvelle sous-cat&eacute;gorie&hellip;" onkeydown="if(event.key==='Enter')addSub(${ci})">
        <button class="sub-add-btn" onclick="addSub(${ci})">+ Ajouter</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="cat-manager">
    <div class="new-cat-bar">
      <span style="font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap">Nouvelle cat&eacute;gorie :</span>
      <select id="nc-icon" style="width:70px">${iconOpts}</select>
      <input id="nc-label" placeholder="Nom de la cat&eacute;gorie" style="flex:1;min-width:150px">
      <select id="nc-color" style="width:130px">${colorOpts}</select>
      <button class="btn primary" onclick="addCat()" style="white-space:nowrap">+ Cr&eacute;er</button>
    </div>
    <div class="cat-manager-grid">${cardsHtml}</div>
    <div style="margin-top:16px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;color:var(--text3)">Les modifications sont sauvegard&eacute;es automatiquement.</span>
      <button class="btn-danger" onclick="resetCats()" style="font-size:12px;padding:6px 12px">&#x21BA; R&eacute;initialiser par d&eacute;faut</button>
    </div>
  </div>`;
}

function toggleCatEdit(ci){
  const el=document.getElementById('cat-edit-'+ci);
  if(!el)return;
  const open=el.style.display==='flex';
  el.style.display=open?'none':'flex';
  el.style.flexDirection='column';
}
function pickEditColor(ci,color){
  CATS[ci]._editColor=color;
  // Update swatches highlight
  const wrap=document.getElementById('cat-edit-colors-'+ci);
  if(wrap) wrap.querySelectorAll('span').forEach(s=>{
    s.style.border='2px solid '+(s.title===color?'#fff':'transparent');
  });
}
function saveCatEdit(ci){
  const labelEl=document.getElementById('cat-edit-label-'+ci);
  const iconEl=document.getElementById('cat-edit-icon-'+ci);
  if(!labelEl||!iconEl)return;
  const newLabel=labelEl.value.trim();
  if(!newLabel){showToast('Intitulé vide');return;}
  const newIcon=iconEl.value;
  const newColor=CATS[ci]._editColor||CATS[ci].color;
  const hex=newColor.replace('#','');
  const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
  CATS[ci].label=newLabel;
  CATS[ci].icon=newIcon;
  CATS[ci].color=newColor;
  CATS[ci].bg=`rgba(${r},${g},${b},0.12)`;
  delete CATS[ci]._editColor;
  saveCats();renderCategoriesView();populateCatSelect();
  showToast('Catégorie mise à jour ✓');
}

function addCat(){
  const icon=document.getElementById('nc-icon').value;
  const label=document.getElementById('nc-label').value.trim();
  const color=document.getElementById('nc-color').value;
  if(!label){showToast('Entrez un nom de catégorie');return;}
  const id='cat-'+Date.now();
  const hex=color.replace('#','');
  const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
  CATS.push({id,label,icon,color,bg:`rgba(${r},${g},${b},0.12)`,subs:[]});
  saveCats();renderCategoriesView();populateCatSelect();
  showToast('Catégorie "'+label+'" créée ✓');
}

async function deleteCat(ci){
  const cat=CATS[ci];
  const used=data.expenses.filter(e=>e.cat===cat.id).length;
  const body=used>0?`Cette catégorie contient <strong>${used} dépense(s)</strong> qui seront également supprimées.`:'Cette action est irréversible.';
  const ok=await showConfirm({icon:cat.icon,title:'Supprimer « '+cat.label+' » ?',body,okLabel:'Supprimer'});
  if(!ok)return;
  CATS.splice(ci,1);saveCats();renderCategoriesView();populateCatSelect();
  showToast('Catégorie supprimée');
}

function addSub(ci){
  const input=document.getElementById('sub-input-'+ci);
  const val=input.value.trim();
  if(!val){showToast('Entrez un nom de sous-catégorie');return;}
  if(CATS[ci].subs.includes(val)){showToast('Cette sous-catégorie existe déjà');return;}
  CATS[ci].subs.push(val);saveCats();renderCategoriesView();populateCatSelect();
  showToast('Sous-catégorie "'+val+'" ajoutée ✓');
}

async function deleteSub(ci,si){
  const sub=CATS[ci].subs[si];
  const used=data.expenses.filter(e=>e.cat===CATS[ci].id&&e.sub===sub).length;
  const body=used>0?`<strong>${sub}</strong> est utilisée dans <strong>${used} dépense(s)</strong>.`:`Supprimer la sous-catégorie <strong>${sub}</strong> ?`;
  const ok=await showConfirm({icon:'🏷️',title:'Supprimer cette sous-catégorie ?',body,okLabel:'Supprimer'});
  if(!ok)return;
  CATS[ci].subs.splice(si,1);saveCats();renderCategoriesView();populateCatSelect();
  showToast('Sous-catégorie supprimée');
}

async function resetCats(){
  const ok=await showConfirm({icon:'↺',title:'Réinitialiser les catégories ?',body:'Toutes vos catégories personnalisées seront <strong>définitivement perdues</strong> et remplacées par les catégories par défaut.',okLabel:'Réinitialiser'});
  if(!ok)return;
  CATS.length=0;DEFAULT_CATS.forEach(c=>CATS.push(JSON.parse(JSON.stringify(c))));
  saveCats();renderCategoriesView();populateCatSelect();
  showToast('Catégories réinitialisées ✓');
}


function populateCatSelect(){
  // Rebuild sidebar cat links
  const navSec = document.querySelector('.sidebar-nav');
  // Remove ALL previous cat section elements (section title + wrappers)
  navSec.querySelectorAll('.cat-nav-item').forEach(el=>el.remove());
  // Re-add section + items
  const sec=document.createElement('div');
  sec.className='nav-section cat-nav-item'; sec.style.marginTop='8px'; sec.textContent='Catégories';
  navSec.appendChild(sec);
  CATS.forEach((cat,idx)=>{
    const wrap=document.createElement('div');
    wrap.className='cat-nav-item';
    wrap.style.cssText='display:flex;align-items:center;width:100%;margin-bottom:2px';

    const btn=document.createElement('button');
    btn.className='nav-item';
    btn.style.setProperty('flex','1');
    btn.style.setProperty('margin-bottom','0');
    btn.style.setProperty('--i', String(idx+5));
    btn.innerHTML=`<span class="ico" style="animation:iconFloat ${2+idx*0.2}s ease-in-out ${idx*0.25}s infinite">${cat.icon}</span> ${cat.label}`;
    btn.onclick=function(){showView('dashboard',document.querySelector('.nav-item'));scrollToCat(cat.id);closeSidebar();};

    const addBtn=document.createElement('button');
    addBtn.title='Ajouter une dépense – '+cat.label;
    addBtn.textContent='+';
    addBtn.className='cat-add-btn';
    addBtn.onclick=function(e){
      e.stopPropagation();
      modalCat=cat.id; modalSub=null;
      showView('dashboard',document.querySelector('.nav-item'));
      openModal();
    };

    wrap.appendChild(btn);
    wrap.appendChild(addBtn);
    navSec.appendChild(wrap);
  });
}

// Theme toggle
function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  if(isDark){ html.removeAttribute('data-theme'); } else { html.setAttribute('data-theme','dark'); }
  document.getElementById('theme-ico').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = isDark ? 'Thème clair' : 'Thème sombre';
  try { localStorage.setItem('monbudget_theme', isDark ? 'light' : 'dark'); } catch(e){}
}
// Restore saved theme
try { if(localStorage.getItem('monbudget_theme')==='dark'){ document.documentElement.setAttribute('data-theme','dark'); document.getElementById('theme-ico').textContent='🌙'; document.getElementById('theme-label').textContent='Thème sombre'; } } catch(e){}

// Ripple + mouse glow on buttons
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn, .btn-danger');
  if (!btn) return;
  const r = document.createElement('span');
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.5;
  r.style.cssText = `position:absolute;width:${size}px;height:${size}px;border-radius:50%;background:rgba(255,255,255,0.18);transform:translate(-50%,-50%) scale(0);left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px;pointer-events:none;animation:ripple 0.5s ease-out forwards;`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 500);
});
document.addEventListener('mousemove', e => {
  const btn = e.target.closest('.btn, .btn-danger');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  btn.style.setProperty('--mx', ((e.clientX - rect.left) / rect.width * 100) + '%');
  btn.style.setProperty('--my', ((e.clientY - rect.top) / rect.height * 100) + '%');
});


// ── CONFIRM MODAL (remplace window.confirm) ───────────────────────────────
let _confirmResolve = null;
function showConfirm({ icon='⚠️', title='Confirmer', body='', okLabel='Confirmer', okDanger=true } = {}) {
  document.getElementById('confirm-modal-icon').textContent = icon;
  document.getElementById('confirm-modal-title').textContent = title;
  document.getElementById('confirm-modal-body').innerHTML = body;
  const okBtn = document.getElementById('confirm-modal-ok');
  okBtn.textContent = okLabel;
  okBtn.className = okDanger ? 'btn-danger' : 'btn primary';
  document.getElementById('confirm-modal-bg').classList.add('open');
  return new Promise(resolve => { _confirmResolve = resolve; });
}
function confirmModalResolve(val) {
  document.getElementById('confirm-modal-bg').classList.remove('open');
  if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
}
// Délégation : l'élément confirm-modal-bg est dans le DOM APRÈS ce script
document.addEventListener('click', e => {
  if (e.target && e.target.id === 'confirm-modal-bg') confirmModalResolve(false);
});
document.addEventListener('keydown', e => {
  const bg = document.getElementById('confirm-modal-bg');
  if (e.key === 'Escape' && bg && bg.classList.contains('open')) {
    confirmModalResolve(false);
  }
});

renderAll();
